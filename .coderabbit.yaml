# CodeRabbit Central Config — Open Paws Org Default
#
# Deploy to: a GitHub repo named 'coderabbit' in the Open-Paws org,
# at the root as '.coderabbit.yaml'. CodeRabbit reads it automatically
# for any repo that lacks its own .coderabbit.yaml.
#
# Repo-specific configs (e.g. open-paws-platform) override this entirely
# (no inheritance by default). To merge instead of replace, add:
#   inheritance: true
# to the repo-level config.
#
# TIER CLASSIFICATION:
#   Tier 1 (public, no sensitive data): use this config as-is
#   Tier 2/3 (investigation data, witness info, coalition ops): override opt_out: true
#   See ecosystem/repos.md for tier assignments.
#
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
tone_instructions: "Direct and concise. Flag actionable issues only. Use movement terminology: campaign, investigation, coalition, farmed animal, slaughterhouse."

reviews:
  profile: assertive
  request_changes_workflow: true    # required for auto-merge workflow APPROVED state check
  high_level_summary: true
  poem: false
  review_status: true
  estimate_code_review_effort: true
  suggested_labels: true
  auto_apply_labels: false

  labeling_instructions:
    - label: "security"
      instructions: "Apply when changes touch authentication, authorization, secrets, or activist/coalition data handling."
    - label: "breaking-change"
      instructions: "Apply when changes remove or alter existing public API contracts, endpoints, or database schemas."

  path_filters:
    - "!dist/**"
    - "!node_modules/**"
    - "!**/*.lock"
    - "!**/*.generated.*"
    - "!.claude/worktrees/**"

  path_instructions:
    - path: "**/*.test.{ts,js,py}"
      instructions: |
        Check three things per test: (1) would it fail if the covered behavior broke? (2) does it encode a domain rule? (3) would mutation testing kill it?
        Reject: snapshot traps, mock-everything integration tests, happy-path-only, test-after-commit, coverage theater.
    - path: ".claude/**"
      instructions: |
        Scan for hidden Unicode (Rules File Backdoor attack). Flag hooks that expand scope. Ensure no activist identities, investigation names, or org intelligence is embedded in instruction files.

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: ["WIP", "DO NOT MERGE"]
    drafts: false
    base_branches: ["main"]
    ignore_usernames: ["dependabot[bot]", "renovate[bot]"]

  pre_merge_checks:
    title:
      mode: "warning"
      requirements: "Imperative verb, under 70 characters."
    custom_checks:
      - name: "No hardcoded secrets or credentials"
        mode: "error"
        instructions: "Fail if any non-test file contains hardcoded API keys, tokens, passwords, database URLs, or service account credentials."
      - name: "No speciesist idioms"
        mode: "error"
        instructions: |
          Fail if code, comments, variable names, or docs contain speciesist idioms:
          'livestock' → 'farmed animals', 'master/slave' → 'primary/replica',
          'whitelist/blacklist' → 'allowlist/denylist', 'cattle vs pets' → 'ephemeral vs persistent',
          'kill two birds' → 'accomplish two things at once', 'guinea pig' → 'test subject',
          'farm' (industry euphemism) → 'factory farm'.

  finishing_touches:
    unit_tests:
      enabled: true
    custom:
      - name: "fix NAV violations"
        instructions: |
          Replace speciesist idioms in changed files. Key mappings: 'livestock' → 'farmed animals',
          'master/slave' → 'primary/replica', 'whitelist/blacklist' → 'allowlist/denylist',
          'cattle vs pets' → 'ephemeral vs persistent'. Full list: https://github.com/Open-Paws/no-animal-violence

  tools:
    semgrep:
      enabled: true
      config_file: "semgrep-no-animal-violence.yaml"
    github-checks:
      enabled: true
      timeout_ms: 90000
    trufflehog:
      enabled: true
    languagetool:
      enabled: true
      level: "default"

chat:
  auto_reply: true
  art: false

knowledge_base:
  opt_out: false
  web_search:
    enabled: false
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
  learnings:
    scope: "local"
  issues:
    scope: "local"
  pull_requests:
    scope: "local"
  jira:
    usage: "disabled"
  linear:
    usage: "disabled"
  mcp:
    usage: "disabled"   # re-enable when Gary MCP hub is active

code_generation:
  unit_tests:
    path_instructions:
      - path: "**"
        instructions: "Every test must fail if the covered behavior breaks. No snapshot tests. Mock only at external API boundaries."
